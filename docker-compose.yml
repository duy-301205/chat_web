services:
  db:
    image: postgres:16
    container_name: chatweb-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '11111111'
      POSTGRES_DB: chatweb_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: chatweb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: [ "redis-server", "--appendonly", "yes" ]
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: